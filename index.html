<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソドー島マップ - 記事データベース</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #533483;
            color: white;
        }

        .btn-secondary:hover {
            background: #7952a3;
        }

        .btn-danger {
            background: #c0392b;
            color: white;
        }

        .btn-danger:hover {
            background: #e74c3c;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .map-container {
            position: relative;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .map-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .map-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .pin {
            position: absolute;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -100%);
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .pin:hover {
            transform: translate(-50%, -100%) scale(1.3);
        }

        .pin svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
        }

        .pin-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 5px;
        }

        .pin:hover .pin-tooltip {
            opacity: 1;
        }

        .map-wrapper.admin-mode {
            cursor: crosshair;
        }

        .map-wrapper.admin-mode img {
            border: 3px solid #e94560;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #16213e;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #e94560;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .admin-panel {
            display: none;
            background: #16213e;
            padding: 15px 30px;
            border-bottom: 1px solid #0f3460;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-panel p {
            color: #e94560;
            font-weight: bold;
        }

        .admin-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pin-list {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .pin-list h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .pin-list-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .pin-item {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pin-item-info {
            flex: 1;
            margin-right: 10px;
        }

        .pin-item-title {
            font-weight: bold;
            color: #fff;
        }

        .pin-item-url {
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }

        .pin-item-actions {
            display: flex;
            gap: 8px;
        }

        .stats {
            background: #0f3460;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }

        .color-option:hover {
            transform: scale(1.2);
        }

        .color-option.selected {
            border-color: white;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .admin-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🚂 ソドー島マップ - 記事データベース</h1>
        <div class="header-buttons">
            <button class="btn btn-primary" id="adminBtn">🔐 管理者ログイン</button>
        </div>
    </header>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-info">
            <p>📍 管理モード: 地図をクリックしてピンを追加</p>
            <div>
                <button class="btn btn-secondary btn-small" id="toggleListBtn">ピン一覧表示</button>
                <button class="btn btn-secondary btn-small" id="exportBtn">JSONエクスポート</button>
                <button class="btn btn-danger btn-small" id="logoutBtn">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="map-container">
        <div class="stats" id="stats">登録ピン数: 0</div>
        <div class="map-wrapper" id="mapWrapper">
           <img src="https://lh3.googleusercontent.com/d/1ZuFen9JHiu5dyNMLaWfQ8B1sHDrX2_f9" alt="ソドー島マップ" id="mapImage">
            <div id="pinsContainer"></div>
        </div>
    </div>

    <div class="pin-list" id="pinList" style="display: none;">
        <h3>📌 登録済みピン一覧</h3>
        <div class="pin-list-items" id="pinListItems"></div>
    </div>

    <!-- ログインモーダル -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>🔐 管理者ログイン</h2>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" id="passwordInput" placeholder="パスワードを入力">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelLogin">キャンセル</button>
                <button class="btn btn-primary" id="submitLogin">ログイン</button>
            </div>
        </div>
    </div>

    <!-- ピン追加/編集モーダル -->
    <div class="modal-overlay" id="pinModal">
        <div class="modal">
            <h2 id="pinModalTitle">📍 ピンを追加</h2>
            <div class="form-group">
                <label>タイトル（場所名）</label>
                <input type="text" id="pinTitle" placeholder="例: ティドマス機関庫">
            </div>
            <div class="form-group">
                <label>リンクURL</label>
                <input type="url" id="pinUrl" placeholder="[kyutaro8.blog.jp](https://kyutaro8.blog.jp/archives/xxx)">
            </div>
            <div class="form-group">
                <label>ピンの色</label>
                <div class="color-options" id="colorOptions">
                    <div class="color-option selected" data-color="#e94560" style="background: #e94560;"></div>
                    <div class="color-option" data-color="#3498db" style="background: #3498db;"></div>
                    <div class="color-option" data-color="#2ecc71" style="background: #2ecc71;"></div>
                    <div class="color-option" data-color="#f39c12" style="background: #f39c12;"></div>
                    <div class="color-option" data-color="#9b59b6" style="background: #9b59b6;"></div>
                    <div class="color-option" data-color="#1abc9c" style="background: #1abc9c;"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelPin">キャンセル</button>
                <button class="btn btn-primary" id="savePin">保存</button>
            </div>
        </div>
    </div>

    <!-- エクスポートモーダル -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <h2>📤 JSONエクスポート</h2>
            <p style="margin-bottom: 15px; color: #aaa; font-size: 14px;">
                下記のJSONをコピーして、GitHubの sodor_map_data.json を更新してください。
            </p>
            <div class="form-group">
                <textarea id="exportData" readonly style="height: 200px; resize: vertical;"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="closeExport">閉じる</button>
                <button class="btn btn-primary" id="copyExport">コピー</button>
            </div>
        </div>
    </div>

    <script>
        // ===================
        // 設定
        // ===================
        const GITHUB_RAW_URL = '[raw.githubusercontent.com](https://raw.githubusercontent.com/Kyue-Silver/sodor/main/sodor_map_data.json)';
        const ADMIN_PASSWORD = '20130227';

        // ===================
        // 状態管理
        // ===================
        let pins = [];
        let isAdminMode = false;
        let pendingPinPosition = null;
        let editingPinId = null;
        let selectedColor = '#e94560';

        // ===================
        // 初期化
        // ===================
        document.addEventListener('DOMContentLoaded', () => {
            loadPins();
            setupEventListeners();
        });

        // ===================
        // データ読み込み（GitHub）
        // ===================
        async function loadPins() {
            try {
                const response = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
                if (response.ok) {
                    pins = await response.json();
                    console.log(`GitHub から ${pins.length} 件のピンを読み込みました`);
                } else {
                    console.warn('GitHub JSON の読み込みに失敗しました');
                    pins = [];
                }
            } catch (error) {
                console.error('読み込みエラー:', error);
                pins = [];
            }
            renderPins();
            updateStats();
        }

        // ===================
        // 統計表示
        // ===================
        function updateStats() {
            document.getElementById('stats').textContent = `登録ピン数: ${pins.length}`;
        }

        // ===================
        // ピン描画
        // ===================
        function renderPins() {
            const container = document.getElementById('pinsContainer');
            container.innerHTML = '';

            pins.forEach(pin => {
                const pinEl = createPinElement(pin);
                container.appendChild(pinEl);
            });

            if (isAdminMode) {
                renderPinList();
            }
            updateStats();
        }

        function createPinElement(pin) {
            const div = document.createElement('div');
            div.className = 'pin';
            div.style.left = `${pin.x}%`;
            div.style.top = `${pin.y}%`;
            div.dataset.id = pin.id;

            const color = pin.color || '#e94560';

            div.innerHTML = `
                <svg viewBox="0 0 24 36" fill="${color}">
                    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0zm0 18c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6z"/>
                </svg>
                <div class="pin-tooltip">${escapeHtml(pin.title)}</div>
            `;

            div.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isAdminMode) {
                    openEditPinModal(pin);
                } else {
                    window.open(pin.url, '_blank');
                }
            });

            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===================
        // ピン一覧（管理用）
        // ===================
        function renderPinList() {
            const listItems = document.getElementById('pinListItems');
            listItems.innerHTML = '';

            pins.forEach(pin => {
                const item = document.createElement('div');
                item.className = 'pin-item';

                const color = pin.color || '#e94560';

                item.innerHTML = `
                    <div class="pin-item-info">
                        <div class="pin-item-title" style="color: ${color}">📍 ${escapeHtml(pin.title)}</div>
                        <div class="pin-item-url">${escapeHtml(pin.url)}</div>
                    </div>
                    <div class="pin-item-actions">
                        <button class="btn btn-secondary btn-small edit-btn" data-id="${pin.id}">編集</button>
                        <button class="btn btn-danger btn-small delete-btn" data-id="${pin.id}">削除</button>
                    </div>
                `;

                listItems.appendChild(item);
            });

            // イベント委譲で編集・削除ボタンを処理
            listItems.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const pin = pins.find(p => p.id === btn.dataset.id);
                    if (pin) openEditPinModal(pin);
                });
            });

            listItems.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    deletePin(btn.dataset.id);
                });
            });
        }

        // ===================
        // イベントリスナー設定
        // ===================
        function setupEventListeners() {
            // 管理者ボタン
            document.getElementById('adminBtn').addEventListener('click', () => {
                if (isAdminMode) {
                    exitAdminMode();
                } else {
                    openLoginModal();
                }
            });

            // ログインモーダル
            document.getElementById('submitLogin').addEventListener('click', attemptLogin);
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') attemptLogin();
            });
            document.getElementById('cancelLogin').addEventListener('click', closeLoginModal);

            // ログアウト
            document.getElementById('logoutBtn').addEventListener('click', exitAdminMode);

            // 地図クリック（ピン追加）
            document.getElementById('mapWrapper').addEventListener('click', handleMapClick);

            // カラー選択
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    selectedColor = opt.dataset.color;
                    updateColorSelection();
                });
            });

            // ピンモーダル
            document.getElementById('savePin').addEventListener('click', savePin);
            document.getElementById('cancelPin').addEventListener('click', closePinModal);

            // ピン一覧表示
            document.getElementById('toggleListBtn').addEventListener('click', togglePinList);

            // エクスポート
            document.getElementById('exportBtn').addEventListener('click', openExportModal);
            document.getElementById('closeExport').addEventListener('click', closeExportModal);
            document.getElementById('copyExport').addEventListener('click', copyExportData);

            // 画像エラー
            document.getElementById('mapImage').addEventListener('error', function() {
                this.style.background = 'linear-gradient(135deg, #2d5016 0%, #4a7c23 50%, #2d5016 100%)';
                this.style.minHeight = '500px';
            });
        }

        // ===================
        // ログイン処理
        // ===================
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('passwordInput').value = '';
        }

        function attemptLogin() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                enterAdminMode();
                closeLoginModal();
            } else {
                alert('パスワードが違います');
            }
        }

        function enterAdminMode() {
            isAdminMode = true;
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('mapWrapper').classList.add('admin-mode');
            document.getElementById('adminBtn').textContent = '🔓 管理モード中';
            renderPinList();
        }

        function exitAdminMode() {
            isAdminMode = false;
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('mapWrapper').classList.remove('admin-mode');
            document.getElementById('adminBtn').textContent = '🔐 管理者ログイン';
            document.getElementById('pinList').style.display = 'none';
        }

        // ===================
        // 地図クリック処理
        // ===================
        function handleMapClick(e) {
            if (!isAdminMode) return;
            if (e.target.closest('.pin')) return;

            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            pendingPinPosition = { x, y };
            editingPinId = null;
            openAddPinModal();
        }

        // ===================
        // ピンモーダル
        // ===================
        function openAddPinModal() {
            document.getElementById('pinModalTitle').textContent = '📍 ピンを追加';
            document.getElementById('pinTitle').value = '';
            document.getElementById('pinUrl').value = '';
            selectedColor = '#e94560';
            updateColorSelection();
            document.getElementById('pinModal').classList.add('active');
            document.getElementById('pinTitle').focus();
        }

        function openEditPinModal(pin) {
            editingPinId = pin.id;
            pendingPinPosition = null;
            document.getElementById('pinModalTitle').textContent = '📍 ピンを編集';
            document.getElementById('pinTitle').value = pin.title;
            document.getElementById('pinUrl').value = pin.url;
            selectedColor = pin.color || '#e94560';
            updateColorSelection();
            document.getElementById('pinModal').classList.add('active');
            document.getElementById('pinTitle').focus();
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('active');
            pendingPinPosition = null;
            editingPinId = null;
        }

        function updateColorSelection() {
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.color === selectedColor);
            });
        }

        function savePin() {
            const title = document.getElementById('pinTitle').value.trim();
            const url = document.getElementById('pinUrl').value.trim();

            if (!title) {
                alert('タイトルを入力してください');
                return;
            }

            if (!url) {
                alert('URLを入力してください');
                return;
            }

            if (editingPinId) {
                // 編集モード
                const pin = pins.find(p => p.id === editingPinId);
                if (pin) {
                    pin.title = title;
                    pin.url = url;
                    pin.color = selectedColor;
                }
            } else if (pendingPinPosition) {
                // 新規追加
                pins.push({
                    id: Date.now().toString(),
                    x: pendingPinPosition.x,
                    y: pendingPinPosition.y,
                    title: title,
                    url: url,
                    color: selectedColor
                });
            }

            renderPins();
            closePinModal();
        }

        function deletePin(id) {
            if (confirm('このピンを削除しますか？')) {
                pins = pins.filter(p => p.id !== id);
                renderPins();
            }
        }

        // ===================
        // ピン一覧表示切替
        // ===================
        function togglePinList() {
            const list = document.getElementById('pinList');
            if (list.style.display === 'none') {
                list.style.display = 'block';
                renderPinList();
            } else {
                list.style.display = 'none';
            }
        }

        // ===================
        // エクスポート
        // ===================
        function openExportModal() {
            const json = JSON.stringify(pins, null, 2);
            document.getElementById('exportData').value = json;
            document.getElementById('exportModal').classList.add('active');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('active');
        }

        function copyExportData() {
            const textarea = document.getElementById('exportData');
            textarea.select();
            document.execCommand('copy');
            alert('クリップボードにコピーしました');
        }
    </script>
</body>
</html>
