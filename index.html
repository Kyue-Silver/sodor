<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソドー島マップ - 記事データベース</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #533483;
            color: white;
        }

        .btn-secondary:hover {
            background: #7952a3;
        }

        .map-container {
            position: relative;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .map-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .map-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .pin {
            position: absolute;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -100%);
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .pin:hover {
            transform: translate(-50%, -100%) scale(1.3);
        }

        .pin svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
        }

        .pin-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 5px;
        }

        .pin:hover .pin-tooltip {
            opacity: 1;
        }

        .map-wrapper.admin-mode {
            cursor: crosshair;
        }

        .map-wrapper.admin-mode img {
            border: 3px solid #e94560;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #16213e;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #e94560;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .admin-panel {
            display: none;
            background: #16213e;
            padding: 15px 30px;
            border-bottom: 1px solid #0f3460;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-panel p {
            color: #e94560;
            font-weight: bold;
        }

        .admin-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pin-list {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .pin-list h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .pin-list-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .pin-item {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pin-item-info {
            flex: 1;
        }

        .pin-item-title {
            font-weight: bold;
            color: #fff;
        }

        .pin-item-url {
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }

        .pin-item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: #c0392b;
            color: white;
        }

        .btn-danger:hover {
            background: #e74c3c;
        }

        .stats {
            background: #0f3460;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }

        .color-option:hover {
            transform: scale(1.2);
        }

        .color-option.selected {
            border-color: white;
        }

        .token-info {
            background: #0f3460;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .admin-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🚂 ソドー島マップ - 記事データベース</h1>
        <div class="header-buttons">
            <button class="btn btn-secondary" id="exportBtn">エクスポート</button>
            <button class="btn btn-primary" id="adminBtn">🔐 管理者ログイン</button>
        </div>
    </header>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-info">
            <p>📍 管理モード: 地図をクリックしてピンを追加</p>
            <div>
                <button class="btn btn-secondary btn-small" id="toggleListBtn">ピン一覧表示</button>
                <button class="btn btn-danger btn-small" id="logoutBtn">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="map-container">
        <div class="stats" id="stats">登録ピン数: 0</div>
        <div class="map-wrapper" id="mapWrapper">
            <img src="[lh3.googleusercontent.com](https://lh3.googleusercontent.com/d/1ZuFen9JHiu5dyNMLaWfQ8B1sHDrX2_f9)" alt="ソドー島マップ" id="mapImage">
            <div id="pinsContainer"></div>
        </div>
    </div>

    <div class="pin-list" id="pinList" style="display: none;">
        <h3>📌 登録済みピン一覧</h3>
        <div class="pin-list-items" id="pinListItems"></div>
    </div>

    <!-- ログインモーダル -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>🔐 管理者ログイン</h2>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" id="passwordInput" placeholder="パスワードを入力">
            </div>
            <div class="form-group">
                <label>GitHub Personal Access Token（編集保存用）</label>
                <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
                <div class="token-info">
                    ※ GitHubリポジトリへの書き込み権限(repo)が必要です<br>
                    ※ Tokenがない場合は閲覧のみ可能です
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelLogin">キャンセル</button>
                <button class="btn btn-primary" id="submitLogin">ログイン</button>
            </div>
        </div>
    </div>

    <!-- ピン追加モーダル -->
    <div class="modal-overlay" id="pinModal">
        <div class="modal">
            <h2>📍 ピンを追加</h2>
            <div class="form-group">
                <label>タイトル（場所名）</label>
                <input type="text" id="pinTitle" placeholder="例: ティドマス機関庫">
            </div>
            <div class="form-group">
                <label>リンクURL</label>
                <input type="url" id="pinUrl" placeholder="[kyutaro8.blog.jp](https://kyutaro8.blog.jp/archives/xxx)">
            </div>
            <div class="form-group">
                <label>ピンの色</label>
                <div class="color-options" id="colorOptions">
                    <div class="color-option selected" data-color="#e94560" style="background: #e94560;"></div>
                    <div class="color-option" data-color="#3498db" style="background: #3498db;"></div>
                    <div class="color-option" data-color="#2ecc71" style="background: #2ecc71;"></div>
                    <div class="color-option" data-color="#f39c12" style="background: #f39c12;"></div>
                    <div class="color-option" data-color="#9b59b6" style="background: #9b59b6;"></div>
                    <div class="color-option" data-color="#1abc9c" style="background: #1abc9c;"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelPin">キャンセル</button>
                <button class="btn btn-primary" id="savePin">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ===================
        // 定数
        // ===================
        const GITHUB_RAW_URL = '[raw.githubusercontent.com](https://raw.githubusercontent.com/Kyue-Silver/sodor/main/sodor_map_data.json)';
        const GITHUB_API_URL = '[api.github.com](https://api.github.com/repos/Kyue-Silver/sodor/contents/sodor_map_data.json)';
        const FIXED_PASSWORD = '20130227';

        // ===================
        // 状態管理
        // ===================
        let pins = [];
        let isAdminMode = false;
        let pendingPin = null;
        let selectedColor = '#e94560';
        let editingPinId = null;
        let githubToken = null;
        let fileSha = null;

        // ===================
        // GitHub操作
        // ===================
        async function loadPins() {
            try {
                // キャッシュを避けるためタイムスタンプを付加
                const response = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
                if (response.ok) {
                    pins = await response.json();
                    console.log(`GitHubから${pins.length}個のピンを読み込みました`);
                } else {
                    console.log('GitHub JSONの読み込みに失敗しました');
                    pins = [];
                }
            } catch (e) {
                console.error('GitHub読み込みエラー:', e);
                pins = [];
            }
            renderPins();
            updateStats();
        }

        async function getFileSha() {
            if (!githubToken) return null;
            try {
                const response = await fetch(GITHUB_API_URL, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    return data.sha;
                }
            } catch (e) {
                console.error('SHA取得エラー:', e);
            }
            return null;
        }

        async function savePinsToGitHub() {
            if (!githubToken) {
                alert('GitHub Tokenが設定されていないため保存できません');
                return false;
            }

            try {
                // 最新のSHAを取得
                fileSha = await getFileSha();
                
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(pins, null, 2))));
                
                const body = {
                    message: `Update pins - ${new Date().toLocaleString('ja-JP')}`,
                    content: content
                };
                
                if (fileSha) {
                    body.sha = fileSha;
                }

                const response = await fetch(GITHUB_API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    const data = await response.json();
                    fileSha = data.content.sha;
                    console.log('✅ GitHubへの保存完了');
                    return true;
                } else {
                    const error = await response.json();
                    console.error('GitHub保存エラー:', error);
                    alert('GitHubへの保存に失敗しました: ' + (error.message || '不明なエラー'));
                    return false;
                }
            } catch (e) {
                console.error('GitHub保存エラー:', e);
                alert('GitHubへの保存中にエラーが発生しました');
                return false;
            }
        }

        function updateStats() {
            document.getElementById('stats').textContent = `登録ピン数: ${pins.length}`;
        }

        // ===================
        // ピン描画
        // ===================
        function renderPins() {
            const container = document.getElementById('pinsContainer');
            container.innerHTML = '';

            pins.forEach(pin => {
                const pinEl = createPinElement(pin);
                container.appendChild(pinEl);
            });

            renderPinList();
            updateStats();
        }

        function createPinElement(pin) {
            const div = document.createElement('div');
            div.className = 'pin';
            div.style.left = `${pin.x}%`;
            div.style.top = `${pin.y}%`;
            div.dataset.id = pin.id;

            div.innerHTML = `
                <svg viewBox="0 0 24 36" fill="${pin.color || '#e94560'}">
                    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0zm0 18c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6z"/>
                </svg>
                <div class="pin-tooltip">${pin.title}</div>
            `;

            div.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isAdminMode) {
                    editPin(pin);
                } else {
                    window.open(pin.url, '_blank');
                }
            });

            return div;
        }

        function renderPinList() {
            const listItems = document.getElementById('pinListItems');
            listItems.innerHTML = '';

            pins.forEach(pin => {
                const item = document.createElement('div');
                item.className = 'pin-item';
                item.innerHTML = `
                    <div class="pin-item-info">
                        <div class="pin-item-title" style="color: ${pin.color || '#e94560'}">📍 ${pin.title}</div>
                        <div class="pin-item-url">${pin.url}</div>
                    </div>
                    <div class="pin-item-actions">
                        <button class="btn btn-secondary btn-small edit-btn" data-id="${pin.id}">編集</button>
                        <button class="btn btn-danger btn-small delete-btn" data-id="${pin.id}">削除</button>
                    </div>
                `;
                listItems.appendChild(item);
            });

            // イベントリスナーを設定
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const pin = pins.find(p => p.id === btn.dataset.id);
                    if (pin) editPin(pin);
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deletePin(btn.dataset.id));
            });
        }

        // ===================
        // 認証
        // ===================
        function checkPassword(input) {
            return input === FIXED_PASSWORD;
        }

        // ===================
        // イベントハンドラ
        // ===================
        document.getElementById('adminBtn').addEventListener('click', () => {
            if (isAdminMode) {
                exitAdminMode();
            } else {
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('passwordInput').focus();
            }
        });

        document.getElementById('submitLogin').addEventListener('click', attemptLogin);
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        function attemptLogin() {
            const password = document.getElementById('passwordInput').value;
            const token = document.getElementById('tokenInput').value.trim();
            
            if (checkPassword(password)) {
                githubToken = token || null;
                enterAdminMode();
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('passwordInput').value = '';
                document.getElementById('tokenInput').value = '';
                
                if (!githubToken) {
                    alert('GitHub Tokenが入力されていないため、閲覧のみ可能です。\n編集を保存するにはTokenが必要です。');
                }
            } else {
                alert('パスワードが違います');
            }
        }

        document.getElementById('cancelLogin').addEventListener('click', () => {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('tokenInput').value = '';
        });

        function enterAdminMode() {
            isAdminMode = true;
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('mapWrapper').classList.add('admin-mode');
            document.getElementById('adminBtn').textContent = '🔓 管理モード中';
        }

        function exitAdminMode() {
            isAdminMode = false;
            githubToken = null;
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('mapWrapper').classList.remove('admin-mode');
            document.getElementById('adminBtn').textContent = '🔐 管理者ログイン';
            document.getElementById('pinList').style.display = 'none';
        }

        document.getElementById('logoutBtn').addEventListener('click', exitAdminMode);

        // 地図クリック
        document.getElementById('mapWrapper').addEventListener('click', (e) => {
            if (!isAdminMode) return;
            if (e.target.closest('.pin')) return;

            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            pendingPin = { x, y };
            editingPinId = null;
            document.getElementById('pinTitle').value = '';
            document.getElementById('pinUrl').value = '';
            selectedColor = '#e94560';
            updateColorSelection();
            document.getElementById('pinModal').classList.add('active');
            document.getElementById('pinTitle').focus();
        });

        // カラー選択
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.addEventListener('click', () => {
                selectedColor = opt.dataset.color;
                updateColorSelection();
            });
        });

        function updateColorSelection() {
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.color === selectedColor);
            });
        }

        // ピン保存
        document.getElementById('savePin').addEventListener('click', async () => {
            const title = document.getElementById('pinTitle').value.trim();
            const url = document.getElementById('pinUrl').value.trim();

            if (!title || !url) {
                alert('タイトルとURLを入力してください');
                return;
            }

            if (editingPinId) {
                // 編集
                const pin = pins.find(p => p.id === editingPinId);
                if (pin) {
                    pin.title = title;
                    pin.url = url;
                    pin.color = selectedColor;
                }
            } else {
                // 新規追加
                pins.push({
                    id: Date.now().toString(),
                    x: pendingPin.x,
                    y: pendingPin.y,
                    title,
                    url,
                    color: selectedColor
                });
            }

            // GitHubに保存
            const saved = await savePinsToGitHub();
            if (saved) {
                renderPins();
                document.getElementById('pinModal').classList.remove('active');
            } else {
                // 保存失敗時はローカルの変更を元に戻す
                await loadPins();
            }
            
            pendingPin = null;
            editingPinId = null;
        });

        document.getElementById('cancelPin').addEventListener('click', () => {
            document.getElementById('pinModal').classList.remove('active');
            pendingPin = null;
            editingPinId = null;
        });

        // ピン編集
        function editPin(pin) {
            editingPinId = pin.id;
            document.getElementById('pinTitle').value = pin.title;
            document.getElementById('pinUrl').value = pin.url;
            selectedColor = pin.color || '#e94560';
            updateColorSelection();
            document.getElementById('pinModal').classList.add('active');
        }

        // ピン削除
        async function deletePin(id) {
            if (confirm('このピンを削除しますか？')) {
                const originalPins = [...pins];
                pins = pins.filter(p => p.id !== id);
                
                const saved = await savePinsToGitHub();
                if (saved) {
                    renderPins();
                } else {
                    pins = originalPins;
                }
            }
        }

        // ピン一覧表示
        document.getElementById('toggleListBtn').addEventListener('click', () => {
            const list = document.getElementById('pinList');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
        });

        // エクスポート
        document.getElementById('exportBtn').addEventListener('click', () => {
            const data = JSON.stringify(pins, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sodor_map_data_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // 初期化
        loadPins();

        // 画像読み込みエラー時の処理
        document.getElementById('mapImage').addEventListener('error', function() {
            this.style.background = 'linear-gradient(135deg, #2d5016 0%, #4a7c23 50%, #2d5016 100%)';
            this.style.minHeight = '500px';
            this.alt = '地図画像を読み込めませんでした';
        });
    </script>
</body>
</html>
